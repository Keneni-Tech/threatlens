{% extends "analyzer/base.html" %}

{% block title %}
    Invalid Request | ThreatLens
{% endblock %}

{% block content %}
    <section
        class="application-error-page"
        aria-labelledby="error-title"
    >
        <p class="error-status-code">400</p>

        <p class="eyebrow">
            Invalid request
        </p>

        <h1 id="error-title">
            ThreatLens could not process that request.
        </h1>

        <p>
            Check the submitted information and try again.
        </p>

        <p class="error-reference">
            Reference ID: {{ request_id }}
        </p>

        <a
            class="primary-link-button"
            href="{% url 'analyzer:investigation_list' %}"
        >
            Return to dashboard
        </a>
    </section>
{% endblock %}
