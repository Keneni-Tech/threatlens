name: Django CI

on:
  push:
    branches:
      - main
  pull_request:

permissions:
  contents: read

jobs:
  test:
    runs-on: ubuntu-latest

    env:
      DJANGO_SECRET_KEY: ci-only-secret-key-4f9280b8ef7d47d2b80baad9f4066b4c
      DJANGO_DEBUG: "False"
      DJANGO_ALLOWED_HOSTS: localhost,127.0.0.1
      DJANGO_SECURE_SSL_REDIRECT: "False"
      OPENAI_API_KEY: test-key-not-used
      OPENAI_MODEL: test-model
      THREATLENS_DEMO_MODE: "True"

    steps:
      - name: Check out repository
        uses: actions/checkout@11d5960a326750d5838078e36cf38b85af677262 # v4

      - name: Set up Python
        uses: actions/setup-python@5fda3b95a4ea91299a34e894583c3862153e4b97 # v7.0.0
        with:
          python-version: "3.13"
          cache: pip

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          python -m pip install pip-audit==2.10.1

      - name: Run Django system checks
        run: |
          python manage.py check
          python manage.py check --deploy

      - name: Verify installed dependencies
        run: |
          python -m pip check
          python -m pip_audit -r requirements.txt

      - name: Check for missing migrations
        run: |
          python manage.py makemigrations --check

      - name: Apply migrations
        run: |
          python manage.py migrate --noinput

      - name: Collect static files
        run: |
          python manage.py collectstatic --noinput

      - name: Run test suite
        run: |
          python manage.py test

      - name: Validate browser JavaScript
        run: |
          node --check analyzer/static/analyzer/app.js
