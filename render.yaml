services:
  - type: web
    name: threatlens
    runtime: python
    plan: free
    branch: main
    buildCommand: >-
      python -m pip install --upgrade pip &&
      pip install -r requirements.txt
    startCommand: bash start.sh
    healthCheckPath: /health/
    autoDeployTrigger: checksPass
    envVars:
      - key: DJANGO_SECRET_KEY
        generateValue: true
      - key: DJANGO_DEBUG
        value: "False"
      - key: DJANGO_SECURE_SSL_REDIRECT
        value: "True"
      - key: DJANGO_TRUST_X_FORWARDED_PROTO
        value: "True"
      - key: DJANGO_SECURE_HSTS_SECONDS
        value: "3600"
      - key: DJANGO_SECURE_HSTS_INCLUDE_SUBDOMAINS
        value: "False"
      - key: DJANGO_SECURE_HSTS_PRELOAD
        value: "False"
      - key: DJANGO_LOG_LEVEL
        value: INFO
      - key: THREATLENS_DEMO_MODE
        value: "True"
      - key: OPENAI_MODEL
        value: gpt-5.6
